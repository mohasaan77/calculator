<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Calculator</title>
  </head>

  <body>
    <div id="main-container">
      <div id="display"><span id="display-content"></span></div>

      <div id="keypad-container">
        <button id="clear-btn" class="btn other-btn">C</button>
        <button id="percentage-btn" class="btn other-btn" value="%">%</button>
        <button id="backspace-btn" class="btn other-btn">⌫</button>
        <button class="btn operator-btn" value="÷">÷</button>

        <button class="btn number-btn" value="7">7</button>
        <button class="btn number-btn" value="8">8</button>
        <button class="btn number-btn" value="9">9</button>
        <button class="btn operator-btn" value="×">×</button>

        <button class="btn number-btn" value="4">4</button>
        <button class="btn number-btn" value="5">5</button>
        <button class="btn number-btn" value="6">6</button>
        <button class="btn operator-btn" value="-">-</button>

        <button class="btn number-btn" value="1">1</button>
        <button class="btn number-btn" value="2">2</button>
        <button class="btn number-btn" value="3">3</button>
        <button class="btn operator-btn" value="+">+</button>

        <button id="negation-btn" class="btn">+/-</button>
        <button class="btn number-btn" value="0">0</button>
        <button class="btn number-btn" value=".">.</button>
        <button id="equal-btn" class="btn">=</button>
      </div>
    </div>
    
    <script src="./script.js"></script>
  </body>
</html>
